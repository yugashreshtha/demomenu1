<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Checkout - Midnight Bites
  </title>

  <link
    rel="stylesheet"
    href="checkout.css"
  />

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />

</head>

<body>

  <!-- NAVBAR -->

  <nav class="navbar">

    <a href="menu.html" class="back-btn">
      ← Back To Menu
    </a>

    <div class="logo">
      MIDNIGHT BITES
    </div>

  </nav>

  <!-- MAIN -->

  <main class="checkout-layout">

    <!-- LEFT -->

    <section class="checkout-left">

      <div class="section-title">

        <span>
          Final Step
        </span>

        <h1>
          Review Your Order
        </h1>

        <p>
          Confirm your premium dining experience.
        </p>

      </div>

      <!-- ITEMS -->

      <div
        id="checkout-items"
        class="checkout-items"
      >
      </div>

    </section>

    <!-- RIGHT -->

    <aside class="checkout-sidebar">

      <div class="summary-box">

        <h2>
          Order Summary
        </h2>

        <!-- SUMMARY -->

        <div class="summary-row">

          <span>
            Items
          </span>

          <span id="item-count">
            0
          </span>

        </div>

        <div class="summary-row total">

          <span>
            Total
          </span>

          <span>
            ₹<span id="checkout-total">0</span>
          </span>

        </div>

        <!-- FORM -->

        <div class="checkout-form">

          <input
            type="text"
            id="customer-name"
            placeholder="Your Name"
          />

          <input
            type="text"
            id="phone-nmber"
            placeholder="Phone Number"
          />

          <textarea
            id="notes"
            placeholder="Special Instructions"
          ></textarea>

        </div>

        <!-- BUTTON -->

        <button
          onclick="placeOrder()"
          class="place-order-btn"
        >
          Place Premium Order
        </button>

      </div>

    </aside>

  </main>

  <!-- EMAILJS -->

  <script
    type="text/javascript"
    src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
  </script>

  <script>

    emailjs.init(
      "xtBxfhhd5RS9Q6DbV"
    );

  </script>

  <!-- JS -->

  <script src="checkout.js"></script>

</body>
</html>
