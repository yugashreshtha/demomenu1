<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Order Confirmed - Midnight Bites
  </title>

  <link
    rel="stylesheet"
    href="thankyou.css"
  />

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />

</head>

<body>

  <!-- BACKGROUND GLOW -->

  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <!-- MAIN -->

  <main class="thankyou-wrapper">

    <section class="thankyou-card">

      <!-- SUCCESS -->

      <div class="success-area">

        <div class="success-circle">
          ✓
        </div>

        <span class="status-tag">
          ORDER CONFIRMED
        </span>

        <h1>
          Your Order Is Being Prepared
        </h1>

        <p>
          Our kitchen has received your premium dining request.
          A waiter will confirm your order shortly.
        </p>

      </div>

      <!-- ORDER DETAILS -->

      <div class="invoice-card">

        <div class="invoice-top">

          <div>

            <span class="invoice-label">
              DIGITAL RECEIPT
            </span>

            <h2>
              Midnight Bites
            </h2>

          </div>

          <div class="invoice-meta">

            <span id="invoice-date"></span>

            <strong id="order-id"></strong>

          </div>

        </div>

        <!-- ITEMS -->

        <div
          id="invoice-items"
          class="invoice-items"
        >
        </div>

        <!-- TOTAL -->

        <div class="invoice-total">

          <span>
            Total Amount
          </span>

          <strong>
            ₹<span id="invoice-total">0</span>
          </strong>

        </div>

      </div>

      <!-- ACTIONS -->

      <div class="action-buttons">

        <button
          onclick="downloadInvoice()"
          class="download-btn"
        >
          Download Invoice
        </button>

        <a
          href="menu.html"
          class="back-menu-btn"
        >
          Order More Food
        </a>

      </div>

    </section>

  </main>

  <script src="thankyou.js"></script>

</body>
</html>
